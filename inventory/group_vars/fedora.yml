packages_remove:
  - gnome-boxes
  - gnome-calendar
  - gnome-clocks
  - gnome-contacts
  - gnome-maps
  - gnome-weather

packages_install:
  - alacritty
  - aria2
  - bat
  - clang
  - eza
  - fd-find
  - ffmpegthumbnailer
  - file-roller
  - file-roller-nautilus
  - firewall-config
  - git-delta
  - gnome-tweaks
  - htop
  - intel-media-driver
  - mpv
  - mullvad-vpn
  - ncdu
  - neovim
  - numix-icon-theme-circle
  - openssl-devel
  - parallel
  - postgresql-server
  - postgresql-contrib
  - puddletag
  - pv
  - qbittorrent
  - restic
  - ripgrep
  - tokei
  - tmux
  - uv
  - zoxide
  - zsh

rust_cargo_crates_platform:
  - bottom
  - starship

fedora_extra_repos:
  - "https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_distribution_major_version }}.noarch.rpm"
  - "https://download1.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_distribution_major_version }}.noarch.rpm"

gtk_bookmarks:
  - "file://{{ ansible_user_dir }}/Documents"
  - "file://{{ ansible_user_dir }}/Music"
  - "file://{{ ansible_user_dir }}/Pictures"
  - "file://{{ ansible_user_dir }}/Videos"
  - "file://{{ ansible_user_dir }}/Downloads"
  - "file://{{ ansible_user_dir }}/Development Development"
  - "file://{{ ansible_user_dir }}/Development/Rust/yombar/Vault Vault"
