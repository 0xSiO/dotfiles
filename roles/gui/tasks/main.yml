- name: Replace default thumbnailer with ffmpegthumbnailer
  become: true
  block:
    - name: Back up totem thumbnailer
      when: not ansible_check_mode
      ansible.builtin.command:
        cmd: mv -n /usr/share/thumbnailers/totem.thumbnailer /usr/share/thumbnailers/totem.thumbnailer.old
        creates: /usr/share/thumbnailers/totem.thumbnailer.old

    - name: Symlink ffmpegthumbnailer as default
      ansible.builtin.file:
        src: /usr/share/thumbnailers/ffmpegthumbnailer.thumbnailer
        dest: /usr/share/thumbnailers/totem.thumbnailer
        state: link
        force: true

- name: Ensure GTK config directory exists
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/gtk-3.0"
    state: directory
    mode: "0755"

- name: Deploy GTK bookmarks
  ansible.builtin.copy:
    dest: "{{ ansible_user_dir }}/.config/gtk-3.0/bookmarks"
    content: "{{ gtk_bookmarks | join('\n') }}\n"
    mode: "0644"
  when: gtk_bookmarks is defined
