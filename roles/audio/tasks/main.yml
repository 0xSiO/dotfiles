- name: Ensure PipeWire config directory exists
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/pipewire/pipewire.conf.d"
    state: directory
    mode: "0755"

- name: Deploy PipeWire quantum config
  ansible.builtin.copy:
    dest: "{{ ansible_user_dir }}/.config/pipewire/pipewire.conf.d/00-increase-quantum.conf"
    content: |
      context.properties = {
          default.clock.quantum     = 2048
          default.clock.min-quantum = 1024
          default.clock.max-quantum = 4096
      }
    mode: "0644"
